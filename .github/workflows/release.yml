name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: agentflow-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            asset_name: agentflow-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            asset_name: agentflow-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: agentflow-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset_name: agentflow-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Run tests
        shell: bash
        run: go test ./...

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/${{ matrix.asset_name }} ./cmd/agentflow

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  test-install:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: agentflow-linux-amd64
            binary_name: agentflow-linux-amd64
            shell: bash
          - os: macos-latest
            artifact: agentflow-darwin-arm64
            binary_name: agentflow-darwin-arm64
            shell: bash
          - os: windows-latest
            artifact: agentflow-windows-amd64.exe
            binary_name: agentflow-windows-amd64.exe
            shell: pwsh
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release-test

      - name: Smoke test binary (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x release-test/${{ matrix.binary_name }}
          release-test/${{ matrix.binary_name }} help
          release-test/${{ matrix.binary_name }} version

      - name: Smoke test binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\release-test\${{ matrix.binary_name }} help
          .\release-test\${{ matrix.binary_name }} version

      - name: Validate install.sh
        if: runner.os != 'Windows'
        shell: bash
        run: bash -n ./install.sh

      - name: Validate install.ps1
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw ./install.ps1), [ref]$null)
          Write-Host "install.ps1 syntax check passed"

  release:
    needs: [build, test-install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect assets
        shell: bash
        run: |
          mkdir -p final-assets
          find release-assets -type f -maxdepth 2 -exec cp {} final-assets/ \;
          ls -la final-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: final-assets/*
          generate_release_notes: true
