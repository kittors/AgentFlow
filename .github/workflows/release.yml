name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      commit: ${{ steps.vars.outputs.commit }}
      build_date: ${{ steps.vars.outputs.build_date }}
      release_tag: ${{ steps.vars.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure run targets current main HEAD
        shell: bash
        run: |
          REMOTE_HEAD="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          if [ -z "${REMOTE_HEAD}" ]; then
            echo "failed to resolve origin/main head" >&2
            exit 1
          fi
          if [ "${GITHUB_SHA}" != "${REMOTE_HEAD}" ]; then
            echo "refusing to publish continuous release from stale commit ${GITHUB_SHA}; current main head is ${REMOTE_HEAD}" >&2
            exit 1
          fi

      - id: vars
        shell: bash
        run: |
          VERSION_BASE="$(grep -m1 '"version"' package.json | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')"
          if [ -z "${VERSION_BASE}" ]; then
            echo "failed to resolve version from package.json" >&2
            exit 1
          fi

          COMMIT="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION="${VERSION_BASE}-main.${COMMIT}"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "commit=${COMMIT}" >> "${GITHUB_OUTPUT}"
          echo "build_date=${BUILD_DATE}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=continuous" >> "${GITHUB_OUTPUT}"

  build:
    needs: [metadata]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: agentflow-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            asset_name: agentflow-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            asset_name: agentflow-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: agentflow-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset_name: agentflow-windows-amd64.exe
          - os: windows-latest
            goos: windows
            goarch: arm64
            asset_name: agentflow-windows-arm64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Run tests
        shell: bash
        run: go test ./...

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags "-s -w -X github.com/kittors/AgentFlow/internal/buildinfo.Version=${{ needs.metadata.outputs.version }} -X github.com/kittors/AgentFlow/internal/buildinfo.Commit=${{ needs.metadata.outputs.commit }} -X github.com/kittors/AgentFlow/internal/buildinfo.BuildDate=${{ needs.metadata.outputs.build_date }}" -o dist/${{ matrix.asset_name }} ./cmd/agentflow

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  test-install:
    needs: [metadata, build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: agentflow-linux-amd64
            binary_name: agentflow-linux-amd64
            shell: bash
          - os: macos-latest
            artifact: agentflow-darwin-arm64
            binary_name: agentflow-darwin-arm64
            shell: bash
          - os: windows-latest
            artifact: agentflow-windows-amd64.exe
            binary_name: agentflow-windows-amd64.exe
            shell: pwsh
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release-test

      - name: Smoke test binary (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x release-test/${{ matrix.binary_name }}
          release-test/${{ matrix.binary_name }} help
          release-test/${{ matrix.binary_name }} version

      - name: Smoke test binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\release-test\${{ matrix.binary_name }} help
          .\release-test\${{ matrix.binary_name }} version

      - name: Validate install.sh
        if: runner.os != 'Windows'
        shell: bash
        run: bash -n ./install.sh

      - name: Validate install.ps1
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw ./install.ps1), [ref]$null)
          Write-Host "install.ps1 syntax check passed"

  release:
    needs: [metadata, build, test-install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect assets
        shell: bash
        run: |
          mkdir -p final-assets
          find release-assets -type f -maxdepth 2 -exec cp {} final-assets/ \;
          ls -la final-assets

      - name: Delete previous continuous release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ needs.metadata.outputs.release_tag }}" --cleanup-tag -y --repo "${{ github.repository }}" || true

      - name: Delete previous continuous tag ref
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/${{ needs.metadata.outputs.release_tag }}" || true

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.metadata.outputs.release_tag }}" final-assets/* \
            --repo "${{ github.repository }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ needs.metadata.outputs.version }}" \
            --notes "Continuous release from main commit ${{ needs.metadata.outputs.commit }}" \
            --latest

      - name: Publish continuous release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ needs.metadata.outputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --latest \
            --title "${{ needs.metadata.outputs.version }}"

      - name: Verify continuous release is public
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ needs.metadata.outputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --json isDraft,name,tagName,targetCommitish,url
