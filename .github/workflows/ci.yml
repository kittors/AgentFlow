name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Verify formatting
        shell: bash
        run: |
          test -z "$(gofmt -l .)"

      - name: Run tests
        shell: bash
        run: |
          go test ./...

      - name: Build CLI
        shell: bash
        run: |
          go build -o /tmp/agentflow ./cmd/agentflow
