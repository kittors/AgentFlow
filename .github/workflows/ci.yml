name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Verify formatting
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          test -z "$(gofmt -l .)"

      - name: Run tests
        shell: bash
        run: |
          go test ./...

      - name: Build CLI
        shell: bash
        run: |
          COMMIT="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -ldflags "-X github.com/kittors/AgentFlow/internal/buildinfo.Version=dev -X github.com/kittors/AgentFlow/internal/buildinfo.Commit=${COMMIT} -X github.com/kittors/AgentFlow/internal/buildinfo.BuildDate=${BUILD_DATE}" -o /tmp/agentflow ./cmd/agentflow
