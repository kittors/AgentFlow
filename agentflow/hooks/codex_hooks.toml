# Codex CLI hooks for AgentFlow
# NOTE: Codex CLI does not have a hooks API like Claude Code.
# These are reference commands that the AI agent should execute
# via the prompt rules in AGENTS.md, not via config.toml injection.
#
# KB sync (after file changes):
#   agentflow kb sync --quiet
#
# Session save (on session end):
#   agentflow session save --quiet --stage=SESSION_END
#
# Update check:
#   agentflow --check-update --silent
